receivers:
  otlp:
    protocols:
      grpc:
        endpoint: otel-collector:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 1m
          static_configs:
            - targets: ["otel-collector:8888"]
        - job_name: "prometheus"
          scrape_interval: 1m
          static_configs:
            - targets: ["prometheus:9090"]
        - job_name: "node"
          scrape_interval: 1m
          static_configs:
            - targets: ["node_exporter:9100"]

processors:
  batch:

extensions:
  health_check: {}
exporters:
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:9464"
  debug:

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp, debug]

    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheus, debug]
